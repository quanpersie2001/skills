<svg viewBox="0 0 1024 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Pulse logo corrected</title>
  <desc id="desc">A corrected Pulse logo with inner border radius matching the outer box and a complete C-shape frame.
  </desc>

  <g id="background">
    <rect x="0" y="0" width="1024" height="512" rx="32" fill="#f5f4ed" />
  </g>

  <g id="icon" transform="translate(96 96)">
    <rect x="0" y="0" width="320" height="320" rx="40" fill="#141413" />

    <g id="gate-frame">
      <path d="M 240 112 Q 240 80 208 80 H 112 Q 80 80 80 112 V 208 Q 80 240 112 240 H 208 Q 240 240 240 208"
        fill="none" stroke="#c96442" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />
    </g>

    <g id="pulse-pattern">
      <path d="M 60 160 H 120 L 140 126 L 160 194 L 180 126 L 200 160 H 240" fill="none" stroke="#f5f4ed"
        stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 244 142 L 277 160 L 244 178 Z" fill="#f5f4ed" stroke="#f5f4ed" stroke-width="12"
        stroke-linejoin="round" />
    </g>
  </g>

  <g id="wordmark" transform="translate(458 0)">
    <text x="0" y="245" fill="#141413"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="126"
      font-weight="700" letter-spacing="-3">Pulse</text>
    <rect x="4" y="274" width="236" height="12" rx="6" fill="#c96442" />
    <text x="0" y="334" fill="#141413" opacity="0.68"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="28"
      font-weight="600" letter-spacing="3.2">GATED DELIVERY CHAIN</text>
  </g>
</svg>
